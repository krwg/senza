name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:version && npm run build && npm run build:icons
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: senza-windows
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:version && npm run build && npm run build:icons
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: senza-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:version && npm run build && npm run build:icons
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: senza-linux
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  release:
    needs: [build-win, build-mac, build-linux]
    if: ${{ !cancelled() && needs.build-win.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: false
          body_path: docs/release-notes-v1.1.0-legato-github.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
