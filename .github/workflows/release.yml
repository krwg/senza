name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:version && npm run build && npm run build:icons
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: senza-windows
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:version && npm run build && npm run build:icons
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: senza-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:version && npm run build && npm run build:icons
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: senza-linux
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  release:
    needs: [build-win, build-mac, build-linux]
    if: ${{ !cancelled() && needs.build-win.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Unexpected tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi

          CODENAME=$(node -e "const r=require('./senza.release.json'); process.stdout.write(String(r.codename||'').trim())")
          if [[ -z "$CODENAME" ]]; then
            echo "senza.release.json is missing codename"
            exit 1
          fi
          SLUG=$(echo "$CODENAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')

          CANDIDATES=(
            "docs/release-notes-v${VERSION}-${SLUG}-github.md"
            "docs/release-notes-v${VERSION}-github.md"
          )
          NOTES=""
          for f in "${CANDIDATES[@]}"; do
            if [[ -f "$f" ]]; then
              NOTES="$f"
              break
            fi
          done

          if [[ -z "$NOTES" ]]; then
            shopt -s nullglob
            MATCHES=(docs/release-notes-v"${VERSION}"-*-github.md)
            if (( ${#MATCHES[@]} == 1 )); then
              NOTES="${MATCHES[0]}"
            elif (( ${#MATCHES[@]} > 1 )); then
              echo "Multiple release note files for v${VERSION}:"
              printf ' - %s\n' "${MATCHES[@]}"
              echo "Expected primary: docs/release-notes-v${VERSION}-${SLUG}-github.md"
              exit 1
            fi
          fi

          if [[ -z "$NOTES" || ! -f "$NOTES" ]]; then
            echo "Missing release notes for tag ${TAG}."
            echo "Add docs/release-notes-v${VERSION}-${SLUG}-github.md (codename from senza.release.json)."
            exit 1
          fi

          echo "Using release notes: $NOTES"
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: false
          body_path: ${{ steps.notes.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
